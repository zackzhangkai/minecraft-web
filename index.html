<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft 冒险世界</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sky: #5c9fd4;
      --grass: #5ab964;
      --dirt: #8b6914;
      --stone: #757575;
      --cobble: #555;
      --wood: #6d4c2f;
      --sand: #d4c458;
      --water: #3c9eff;
    }

    body {
      font-family: 'VT323', cursive;
      background: var(--sky);
      overflow: hidden;
      cursor: none;
    }

    #cursor {
      position: fixed;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
    }

    #game {
      position: fixed;
      inset: 0;
      background: var(--sky);
      overflow: hidden;
    }

    /* World */
    #world {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center;
    }

    .block {
      position: absolute;
      width: 32px;
      height: 32px;
      transition: opacity 0.2s;
    }

    .block-grass { background: linear-gradient(to bottom, var(--grass) 0%, var(--grass) 30%, var(--dirt) 30%); border: 1px solid rgba(0,0,0,0.2); }
    .block-dirt { background: var(--dirt); border: 1px solid rgba(0,0,0,0.2); }
    .block-stone { background: var(--stone); border: 1px solid rgba(0,0,0,0.2); }
    .block-sand { background: var(--sand); border: 1px solid rgba(0,0,0,0.2); }
    .block-cobble { background: var(--cobble); border: 1px solid rgba(0,0,0,0.2); }
    .block-water { background: var(--water); opacity: 0.7; border: 1px solid rgba(0,0,0,0.1); }
    .block-wood { background: linear-gradient(90deg, var(--wood) 0%, #543a1f 50%, var(--wood) 100%); border: 1px solid rgba(0,0,0,0.3); }
    .block-leaves { background: #3a6a2a; opacity: 0.9; border: 1px solid rgba(0,0,0,0.2); }
    .block-log { background: linear-gradient(90deg, #5a3a1f 0%, #6d4c2f 30%, #5a3a1f 100%); border: 1px solid rgba(0,0,0,0.3); }
    .block-coal { background: #444; border: 1px solid rgba(0,0,0,0.4); }
    .block-iron { background: #999; border: 1px solid rgba(0,0,0,0.3); }
    .block-gold { background: #da2; border: 1px solid rgba(0,0,0,0.3); }
    .block-diamond { background: #4afcff; border: 1px solid rgba(255,255,255,0.5); }
    .block-redstone { background: #c33; border: 1px solid rgba(0,0,0,0.2); }
    .block-obsidian { background: #1a1a2e; border: 1px solid #000; }
    .block-lava { background: #f60; animation: lava-glow 0.5s infinite; border: 1px solid #000; }

    @keyframes lava-glow {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    /* Player */
    #player {
      position: absolute;
      width: 16px;
      height: 28px;
      z-index: 100;
      transition: transform 0.05s;
    }

    .player-head {
      width: 12px;
      height: 10px;
      background: #8b6914;
      margin: 0 auto;
      border-radius: 2px;
    }

    .player-body {
      width: 10px;
      height: 10px;
      background: #4aaf6a;
      margin: -1px auto 0;
    }

    .player-arm {
      width: 3px;
      height: 10px;
      background: #4aaf6a;
      position: absolute;
      top: 10px;
    }
    .player-arm.left { left: -3px; }
    .player-arm.right { right: -3px; }

    .player-leg {
      width: 4px;
      height: 9px;
      background: #3a5a8a;
      position: absolute;
      bottom: -1px;
    }
    .player-leg.left { left: 1px; }
    .player-leg.right { right: 1px; }

    /* Elytra wings */
    .elytra {
      position: absolute;
      width: 20px;
      height: 12px;
      background: linear-gradient(to right, #4a4a4a, #6a6a6a);
      border: 2px solid #333;
      border-radius: 2px 6px 6px 2px;
      top: 11px;
      left: -2px;
      display: none;
    }

    #player.flying .elytra {
      display: block;
      animation: elytra-flap 0.25s infinite;
    }

    @keyframes elytra-flap {
      0%, 100% { transform: rotate(-20deg); }
      50% { transform: rotate(0deg); }
    }

    /* Clouds */
    .cloud {
      position: absolute;
      background: #fff;
      border-radius: 20px;
      opacity: 0.8;
    }

    /* Mobs */
    .mob {
      position: absolute;
      font-size: 8px;
      cursor: pointer;
      transition: transform 0.1s;
      z-index: 50;
    }
    .mob:hover { transform: scale(1.3); }
    .mob span { font-size: 24px; }

    /* Particles */
    .particle {
      position: absolute;
      font-size: 16px;
      pointer-events: none;
      z-index: 200;
      animation: particle-fade 1s forwards;
    }

    @keyframes particle-fade {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-30px) scale(0.5); }
    }

    /* GUI */
    #gui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 500;
    }

    #hotbar {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 3px;
      pointer-events: auto;
    }

    .hotbar-slot {
      width: 36px;
      height: 36px;
      background: rgba(0,0,0,0.6);
      border: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }

    .hotbar-slot.selected {
      border-color: #fff;
      box-shadow: 0 0 8px #fff;
    }

    .hotbar-slot .count {
      position: absolute;
      bottom: 2px;
      right: 3px;
      font-size: 10px;
      color: #fff;
      text-shadow: 1px 1px 0 #000;
    }

    .hotbar-slot .icon {
      font-size: 18px;
    }

    #health-bar {
      position: fixed;
      top: 15px;
      left: 15px;
      display: flex;
      gap: 3px;
    }

    .heart {
      width: 12px;
      height: 12px;
      background: #c00;
      clip-path: path('M6 2a4 4 0 0 1 8 0c0 4-4 6-4 6S4 6 4 2a4 4 0 0 1 2-2z');
    }

    .heart.empty { opacity: 0.3; }

    #food-bar {
      position: fixed;
      top: 35px;
      left: 15px;
      display: flex;
      gap: 3px;
    }

    .food {
      width: 12px;
      height: 12px;
      background: #ea0;
      clip-path: path('M6 10c0-4-4-4-4-8s4-4 4-8 4 4 4 8-4 4-4 8z');
    }

    .food.empty { opacity: 0.3; }

    #coords {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 18px;
      text-shadow: 2px 2px 0 #000;
    }

    #biome {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: #8f8;
      font-size: 14px;
      text-shadow: 1px 1px 0 #000;
    }

    #block-cursor {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
      text-shadow: 1px 1px 0 #000;
    }

    /* Inventory */
    #inventory {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      z-index: 700;
    }

    #inventory.open { display: flex; }

    .inv-box {
      background: #c6c6c6;
      padding: 8px;
      border: 4px solid #373737;
      max-width: 95vw;
      max-height: 90vh;
      overflow: auto;
    }

    .inv-title {
      background: #5a5a5a;
      color: #fff;
      padding: 5px 10px;
      margin: -8px -8px 8px -8px;
      font-size: 16px;
    }

    .inv-grid {
      display: grid;
      grid-template-columns: repeat(9, 40px);
      gap: 2px;
    }

    .inv-slot {
      width: 40px;
      height: 40px;
      background: #8a8a8a;
      border: 2px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .inv-slot:hover { border-color: #fff; }

    /* Messages */
    #messages {
      position: fixed;
      top: 80px;
      left: 15px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .msg {
      color: #fff;
      font-size: 14px;
      text-shadow: 1px 1px 0 #000;
      animation: msg-fade 5s forwards;
    }

    @keyframes msg-fade {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Menu */
    #menu {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      z-index: 800;
    }

    #menu.hidden { display: none; }

    .menu-title {
      font-size: 48px;
      color: #fff;
      text-shadow: 4px 4px 0 #000;
      letter-spacing: 3px;
    }

    .menu-btn {
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: 3px solid #555;
      padding: 12px 40px;
      font-family: inherit;
      font-size: 20px;
      cursor: pointer;
    }

    .menu-btn:hover {
      background: rgba(90,185,100,0.7);
      border-color: #5ab964;
    }

    .controls-info {
      color: #aaa;
      font-size: 14px;
      margin-top: 20px;
      text-align: center;
      line-height: 1.8;
    }

    /* Death */
    #death {
      position: fixed;
      inset: 0;
      background: rgba(80,0,0,0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 900;
    }

    #death.show { display: flex; }

    #death h1 {
      color: #f00;
      font-size: 48px;
      text-shadow: 0 0 20px #f00;
    }

    /* Loading */
    #loading {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #loading.done { display: none; }

    #loading h1 {
      color: #fff;
      font-size: 42px;
      letter-spacing: 5px;
    }

    .load-bar {
      width: 280px;
      height: 18px;
      background: #333;
      border: 3px solid #555;
      margin-top: 30px;
    }

    #load-progress {
      height: 100%;
      background: #5ab964;
      width: 0%;
      transition: width 0.3s;
    }

    #load-text {
      color: #888;
      margin-top: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="cursor"></div>

  <!-- Loading -->
  <div id="loading">
    <h1>MINECRAFT</h1>
    <div class="load-bar"><div id="load-progress"></div></div>
    <div id="load-text">正在加载...</div>
  </div>

  <!-- Menu -->
  <div id="menu" class="hidden">
    <div class="menu-title">游戏暂停</div>
    <button class="menu-btn" onclick="startGame()">继续游戏</button>
    <button class="menu-btn" onclick="restart()">重新开始</button>
    <div class="controls-info">
      WASD - 移动 | 空格 - 跳跃 | Shift - 潜行/俯冲<br>
      右键 - 放置方块 | 1-9 选择物品 | E - 物品栏
    </div>
  </div>

  <!-- Death -->
  <div id="death">
    <h1>你死了!</h1>
    <button class="menu-btn" onclick="respawn()">重生</button>
  </div>

  <!-- Game -->
  <div id="game">
    <div id="world">
      <div id="player">
        <div class="player-head"></div>
        <div class="player-body"></div>
        <div class="player-arm left"></div>
        <div class="player-arm right"></div>
        <div class="player-leg left"></div>
        <div class="player-leg right"></div>
        <div class="elytra"></div>
      </div>
    </div>
  </div>

  <!-- GUI -->
  <div id="gui">
    <div id="health-bar"></div>
    <div id="food-bar"></div>
    <div id="coords">X: 0 Y: 0 Z: 0</div>
    <div id="biome">森林</div>
    <div id="block-cursor"></div>
    <div id="hotbar"></div>
    <div id="messages"></div>
  </div>

  <!-- Inventory -->
  <div id="inventory">
    <div class="inv-box">
      <div class="inv-title">🎒 物品栏</div>
      <div class="inv-grid" id="inv-grid"></div>
    </div>
  </div>

  <script>
    // ==================== GAME CONFIG ====================
    const HEIGHT_MAP = [];
    const BIOME_MAP = [];

    // Simple height function
    function getHeight(x, z) {
      const h = Math.sin(x * 0.05) * Math.cos(z * 0.05) * 8 +
               Math.sin(x * 0.1 + z * 0.1) * 4;
      return Math.floor(15 + h + Math.random() * 2);
    }

    function getBiome(x, z) {
      const h = Math.sin(x * 0.02) * Math.cos(z * 0.02);
      if (h > 0.5) return '丛林';
      if (h > 0.3) return '森林';
      if (h < -0.3) return '沙漠';
      if (h < -0.1) return '山地';
      return '平原';
    }

    // ==================== STATE ====================
    let state = {
      x: 50, y: 20, z: 50,
      vx: 0, vy: 0, vz: 0,
      health: 20, food: 20,
      onGround: false, flying: false,
      selectedSlot: 0,
      hotbar: [
        { id: 'grass', count: 64, icon: '🌿' },
        { id: 'dirt', count: 64, icon: '🟤' },
        { id: 'stone', count: 32, icon: '🪨' },
        { id: 'cobble', count: 16, icon: '⬜' },
        { id: 'wood', count: 32, icon: '🪵' },
        { id: 'log', count: 16, icon: '🪵' },
        { id: 'coal', count: 24, icon: '⬛' },
        { id: 'iron', count: 12, icon: '⚪' },
        { id: 'diamond', count: 4, icon: '💎' }
      ],
      paused: false, dead: false,
      keys: {}, loaded: false
    };

    let worldBlocks = [];
    let mobs = [];

    // ==================== INIT ====================
    function loadWorld() {
      setLoadProgress(10, '生成地形...');

      const w = document.getElementById('world');
      const worldW = 80, worldH = 40;

      // Generate world data
      for (let x = 0; x < worldW; x++) {
        for (let z = 0; z < worldW; z++) {
          const biome = getBiome(x - 40, z - 40);
          const h = getHeight(x - 40, z - 40);
          const surface = biome === '沙漠' ? 'sand' : biome === '山地' ? 'stone' : 'grass';

          for (let y = 0; y <= h; y++) {
            let type;
            if (y === 0) type = 'obsidian';
            else if (y >= h - 2) type = surface;
            else if (y >= h - 4) type = 'dirt';
            else {
              const r = Math.random();
              if (r < 0.01) type = 'diamond';
              else if (r < 0.03) type = 'gold';
              else if (r < 0.08) type = 'iron';
              else if (r < 0.15) type = 'coal';
              else if (r < 0.02) type = 'redstone';
              else type = 'stone';
            }

            worldBlocks.push({ x: x * 32, y: (25 - y) * 32, z: z * 32, type });
          }

          // Water
          if (h < 15) {
            for (let y = h + 1; y <= 15; y++) {
              worldBlocks.push({ x: x * 32, y: (25 - y) * 32, z: z * 32, type: 'water' });
            }
          }

          // Tree
          if ((biome === '森林' || biome === '丛林') && Math.random() < 0.03 && h > 18) {
            const tx = x * 32, tz = z * 32, ty = (25 - h) * 32;
            for (let i = 0; i < 4; i++) {
              worldBlocks.push({ x: tx, y: ty + i * 32, z: tz, type: 'log' });
            }
            for (let lx = -1; lx <= 1; lx++) {
              for (let ly = 0; ly <= 1; ly++) {
                for (let lz = -1; lz <= 1; lz++) {
                  if (Math.abs(lx) + Math.abs(ly) + Math.abs(lz) <= 2) {
                    worldBlocks.push({ x: tx + lx * 32, y: ty + 32 * (4 + ly), z: tz + lz * 32, type: 'leaves' });
                  }
                }
              }
            }
          }
        }

        if (x % 20 === 0) setLoadProgress(10 + x / 2, '生成地形...');
      }

      setLoadProgress(70, '放置生物...');

      // Spawn mobs
      const mobTypes = [
        { type: 'pig', name: '🐷' },
        { type: 'cow', name: '🐄' },
        { type: 'chicken', name: '🐔' },
        { type: 'sheep', name: '🐑' }
      ];

      for (let i = 0; i < 15; i++) {
        const m = mobTypes[Math.floor(Math.random() * mobTypes.length)];
        mobs.push({
          ...m,
          x: (20 + Math.random() * 40) * 32,
          y: 0,
          z: (20 + Math.random() * 40) * 32,
          health: 10
        });
      }

      setLoadProgress(100, '完成!');
    }

    function renderWorld() {
      const w = document.getElementById('world');
      let html = '';

      // Render visible blocks (culling)
      const viewDist = 400;
      const px = state.x, py = state.y, pz = state.z;

      worldBlocks.forEach(b => {
        const dx = b.x - px, dy = b.y - py, dz = b.z - pz;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

        if (dist < viewDist) {
          const scale = Math.max(0.3, 1 - dist / viewDist);
          const alpha = Math.min(1, scale * 2);
          html += `<div class="block block-${b.type}" style="left:${b.x - px + 400}px;top:${b.y - py + 300}px;opacity:${alpha};transform:scale(${scale});transform-origin:center ${b.y - py + 300}px center;z-index:${-b.z};"></div>`;
        }
      });

      // Add clouds
      for (let i = 0; i < 8; i++) {
        const cx = (Math.sin(i * 1.5) * 500 + 200) - px;
        const cy = 50 + Math.cos(i * 0.8) * 30;
        html += `<div class="cloud" style="left:${cx}px;top:${cy}px;width:${60 + Math.random() * 40}px;height:${20 + Math.random() * 15}px;"></div>`;
      }

      w.innerHTML = html + w.innerHTML;

      // Update player position
      const player = document.getElementById('player');
      player.style.left = '400px';
      player.style.top = '300px';
      player.classList.toggle('flying', state.flying);

      // Render mobs
      renderMobs();
    }

    function renderMobs() {
      const w = document.getElementById('world');
      const px = state.x, py = state.y, pz = state.z;

      let html = '';
      mobs.forEach((m, i) => {
        html += `<div class="mob" style="left:${m.x - px + 400}px;top:${m.y - py + 280}px;z-index:${-m.z}" onclick="attackMob(${i})"><span>${m.name}</span></div>`;
      });

      w.insertAdjacentHTML('beforeend', html);
    }

    function attackMob(i) {
      mobs[i].health -= 5;
      spawnParticle(mobs[i].x - state.x + 400, mobs[i].y - state.y + 300, '💥');

      if (mobs[i].health <= 0) {
        mobs.splice(i, 1);
        showMessage('§a' + mobs[i]?.name + ' 被杀死!');
      }
    }

    // ==================== PHYSICS ====================
    function updatePhysics() {
      if (state.paused || state.dead || !state.loaded) return;

      const speed = 3;
      const gravity = 0.4;

      // Movement
      if (state.keys['w'] || state.keys['arrowup']) state.vz -= speed * 0.15;
      if (state.keys['s'] || state.keys['arrowdown']) state.vz += speed * 0.15;
      if (state.keys['a'] || state.keys['arrowleft']) state.vx -= speed * 0.15;
      if (state.keys['d'] || state.keys['arrowright']) state.vx += speed * 0.15;

      // Jump / Fly
      if (state.keys[' '] || state.keys['space']) {
        if (state.onGround) {
          state.vy = 0.7;
          state.onGround = false;
        } else if (state.flying) {
          state.vy = 0.2;
        }
      }

      // Elytra
      if (state.elytra && state.keys[' ']) {
        state.flying = true;
        state.vy = -0.15;
      }

      // Descend
      if (state.keys['shift']) {
        if (state.flying) state.vy = -0.25;
      }

      // Gravity
      if (!state.onGround && !state.flying) {
        state.vy -= gravity;
      }

      // Friction
      state.vx *= 0.85;
      state.vz *= 0.85;
      if (state.onGround || state.flying) state.vy *= 0.9;

      // Apply
      state.x += state.vx;
      state.y += state.vy;
      state.z += state.vz;

      // Bounds
      state.x = Math.max(32, Math.min(2500, state.x));
      state.z = Math.max(32, Math.min(2500, state.z));

      // Ground collision
      const groundY = findGround(state.x, state.z);
      if (state.y < groundY + 16) {
        state.y = groundY + 16;
        state.vy = 0;
        state.onGround = true;
        state.flying = false;
      } else {
        state.onGround = false;
      }

      // Water
      const inWater = isInBlock(state.x, state.y, 'water');
      if (inWater) {
        state.vy *= 0.8;
        state.vx *= 0.9;
        state.vz *= 0.9;
      }
    }

    function findGround(x, z) {
      for (let b of worldBlocks) {
        if (Math.abs(b.x - x) < 20 && Math.abs(b.z - z) < 20) {
          if (b.type !== 'water' && b.type !== 'leaves') {
            return b.y + 16;
          }
        }
      }
      return 0;
    }

    function isInBlock(x, y, type) {
      return worldBlocks.some(b =>
        Math.abs(b.x - x) < 20 &&
        Math.abs(b.y - y) < 20 &&
        Math.abs(b.z - state.z) < 20 &&
        b.type === type
      );
    }

    // ==================== UI ====================
    function updateUI() {
      // Hearts
      let h = '';
      for (let i = 0; i < 10; i++) {
        h += `<div class="heart ${i < state.health / 2 ? '' : 'empty'}"></div>`;
      }
      document.getElementById('health-bar').innerHTML = h;

      // Food
      let f = '';
      for (let i = 0; i < 10; i++) {
        f += `<div class="food ${i < state.food / 2 ? '' : 'empty'}"></div>`;
      }
      document.getElementById('food-bar').innerHTML = f;

      // Coords
      document.getElementById('coords').textContent =
        `X: ${Math.floor(state.x / 32)} Y: ${Math.floor(state.y / 32)} Z: ${Math.floor(state.z / 32)}`;

      // Biome
      document.getElementById('biome').textContent = '生物群系: ' + getBiome(state.x / 32 - 40, state.z / 32 - 40);
    }

    function initHotbar() {
      const h = document.getElementById('hotbar');
      h.innerHTML = '';

      state.hotbar.forEach((item, i) => {
        const slot = document.createElement('div');
        slot.className = 'hotbar-slot' + (i === 0 ? ' selected' : '');
        slot.innerHTML = `<span class="icon">${item.icon}</span><span class="count">${item.count}</span>`;
        slot.onclick = () => selectSlot(i);
        h.appendChild(slot);
      });

      // Inventory grid
      const inv = document.getElementById('inv-grid');
      inv.innerHTML = '';
      for (let i = 0; i < 27; i++) {
        const slot = document.createElement('div');
        slot.className = 'inv-slot';
        if (state.hotbar[i]) {
          slot.textContent = state.hotbar[i].icon;
        }
        inv.appendChild(slot);
      }
    }

    function selectSlot(i) {
      state.selectedSlot = i;
      document.querySelectorAll('.hotbar-slot').forEach((s, idx) => {
        s.classList.toggle('selected', idx === i);
      });
    }

    function showMessage(text) {
      const msgs = document.getElementById('messages');
      const msg = document.createElement('div');
      msg.className = 'msg';
      msg.textContent = text;
      msgs.appendChild(msg);
      setTimeout(() => msg.remove(), 5000);
    }

    function setLoadProgress(pct, text) {
      document.getElementById('load-progress').style.width = pct + '%';
      document.getElementById('load-text').textContent = text;
    }

    function spawnParticle(x, y, emoji) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emoji;
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      document.getElementById('world').appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }

    // ==================== SOUND ====================
    function playSound(type) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      const sounds = { hit: 200, place: 300, break: 150, eat: 400 };
      osc.frequency.value = sounds[type] || 200;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      osc.start();
      osc.stop(ctx.currentTime + 0.15);
    }

    // ==================== INPUT ====================
    document.addEventListener('keydown', e => {
      state.keys[e.key.toLowerCase()] = true;

      if (e.key >= '1' && e.key <= '9') selectSlot(parseInt(e.key) - 1);
      if (e.key.toLowerCase() === 'e') document.getElementById('inventory').classList.toggle('open');
      if (e.key === 'Escape') togglePause();
    });

    document.addEventListener('keyup', e => {
      state.keys[e.key.toLowerCase()] = false;
    });

    document.addEventListener('mousemove', e => {
      document.getElementById('cursor').style.left = e.clientX + 'px';
      document.getElementById('cursor').style.top = e.clientY + 'px';
    });

    document.addEventListener('mousedown', e => {
      if (e.button === 2) { // Right click - place
        e.preventDefault();
        const item = state.hotbar[state.selectedSlot];
        if (item && item.count > 0) {
          const bx = Math.floor(state.x / 32) * 32;
          const by = Math.floor(state.y / 32) * 32 + 32;
          const bz = Math.floor(state.z / 32 + 3) * 32;

          worldBlocks.push({ x: bx, y: by, z: bz, type: item.id });
          item.count--;

          spawnParticle(bx - state.x + 400, by - state.y + 300, item.icon);
          playSound('place');
          initHotbar();
        }
      }
    });

    document.addEventListener('contextmenu', e => e.preventDefault());

    function togglePause() {
      if (!state.dead) {
        state.paused = !state.paused;
        document.getElementById('menu').classList.toggle('hidden', !state.paused);
      }
    }

    function startGame() {
      state.paused = false;
      document.getElementById('menu').classList.add('hidden');
    }

    function restart() {
      location.reload();
    }

    function respawn() {
      state.health = 20;
      state.food = 20;
      state.x = 50 * 32;
      state.y = 20 * 32;
      state.z = 50 * 32;
      state.vx = state.vy = state.vz = 0;
      state.dead = false;
      document.getElementById('death').classList.remove('show');
    }

    // ==================== GAME LOOP ====================
    function gameLoop() {
      updatePhysics();
      renderWorld();
      updateUI();
      requestAnimationFrame(gameLoop);
    }

    // ==================== START ====================
    function start() {
      loadWorld();

      setTimeout(() => {
        document.getElementById('loading').classList.add('done');
        document.getElementById('menu').classList.remove('hidden');
        state.loaded = true;
        initHotbar();
        showMessage('欢迎! 用 WASD 移动, 空格跳跃, 右键放置方块');
        gameLoop();
      }, 500);
    }

    start();
  </script>
</body>
</html>
